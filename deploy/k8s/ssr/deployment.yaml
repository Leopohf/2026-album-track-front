apiVersion: apps/v1
kind: Deployment
metadata:
  name: album-app-ssr
  labels:
    app: album-app-ssr
spec:
  replicas: 3
  selector:
    matchLabels:
      app: album-app-ssr
  template:
    metadata:
      labels:
        app: album-app-ssr
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000 # default node UID in alpine-node
        fsGroup: 1000
      containers:
      - name: app
        image: album-app-ssr:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 4000
        env:
        - name: NODE_ENV
          value: "production"
        - name: ALLOWED_ORIGINS
          valueFrom:
            configMapKeyRef:
              name: album-app-config
              key: allowed-origins
              optional: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        readinessProbe:
          httpGet:
            path: /
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 4000
          initialDelaySeconds: 15
          periodSeconds: 20
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
      volumes:
      - name: tmp-volume
        emptyDir: {}
