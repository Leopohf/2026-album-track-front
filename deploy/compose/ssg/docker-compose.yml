services:
  app:
    build:
      context: ../../../
      dockerfile: deploy/ssg/Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    networks:
      - album-network

  nginx-lb:
    build:
      context: ../../ssg
      dockerfile: Dockerfile.lb
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - album-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  album-network:
    driver: bridge
