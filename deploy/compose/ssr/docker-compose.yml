services:
  app:
    build:
      context: ../../../
      dockerfile: deploy/ssr/Dockerfile
    restart: unless-stopped
    environment:
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:4200,http://localhost:4000,http://localhost:8080}
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
    networks:
      - album-network

  nginx-lb:
    build:
      context: ../../ssr
      dockerfile: Dockerfile.lb
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - album-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  album-network:
    driver: bridge
