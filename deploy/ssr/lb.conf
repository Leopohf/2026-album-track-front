upstream album_app_ssr {
    # The name 'app' corresponds to the service name in docker-compose.ssr.yml
    # SSR container listens on port 4000
    server app:4000;
}

server {
    listen 80;

    location / {
        proxy_pass http://album_app_ssr;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
